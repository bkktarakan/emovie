name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Package application into a single archive
        run: |
          mkdir -p _deploy
          zip -rq _deploy/deploy.zip . \
            -x ".git/*" -x ".github/*" -x "node_modules/*" -x "tests/*" \
            -x ".env" -x ".env.*" \
            -x "storage/logs/*" \
            -x "storage/framework/sessions/*" -x "storage/framework/views/*" \
            -x "storage/framework/cache/*" -x "storage/framework/testing/*" \
            -x "db_emovie_laravel.sql" \
            -x "_deploy/*" -x "deploy-unzip.php.template"

      - name: Prepare remote extractor script
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          perl -pe 's/__DEPLOY_TOKEN__/$ENV{DEPLOY_TOKEN}/g' deploy-unzip.php.template > _deploy/deploy-unzip.php

      - name: Upload package via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: _deploy/

      - name: Trigger remote extraction
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          code=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST \
            -H "X-Deploy-Token: ${DEPLOY_TOKEN}" \
            "${SITE_URL%/}/deploy-unzip.php")
          cat /tmp/response.txt
          echo
          if [ "$code" -ne 200 ]; then
            echo "Extraction failed with HTTP $code"
            exit 1
          fi
